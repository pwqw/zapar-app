name: Build & Deploy

on:
  workflow_dispatch:
    inputs:
      build_ios:
        description: 'Build iOS app (requires macOS runner)'
        required: false
        type: boolean
        default: false
      deploy_to_playstore:
        description: 'Deploy to Google Play Store'
        required: false
        type: boolean
        default: false
      track:
        description: 'Play Store track (internal/alpha/beta/production)'
        required: false
        type: choice
        default: 'internal'
        options:
          - internal
          - alpha
          - beta
          - production
  push:
    tags:
      - 'v*'

env:
  BASE_VERSION_CODE: 100

jobs:
  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: PlayStore

    steps:
      # =================================================================
      # FASE 1: VALIDACIÓN TEMPRANA (Fail Fast)
      # =================================================================

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔐 Validate required secrets
        run: |
          echo "Validating required secrets..."

          if [ -z "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "❌ ERROR: KEYSTORE_BASE64 secret is not set"
            echo "Please configure it in: Settings → Environments → PlayStore"
            exit 1
          fi

          if [ -z "${{ secrets.KEYSTORE_PASSWORD }}" ]; then
            echo "❌ ERROR: KEYSTORE_PASSWORD secret is not set"
            echo "Please configure it in: Settings → Environments → PlayStore"
            exit 1
          fi

          if [ -z "${{ secrets.KEY_ALIAS }}" ]; then
            echo "❌ ERROR: KEY_ALIAS secret is not set"
            echo "Please configure it in: Settings → Environments → PlayStore"
            exit 1
          fi

          if [ -z "${{ secrets.KEY_PASSWORD }}" ]; then
            echo "❌ ERROR: KEY_PASSWORD secret is not set"
            echo "Please configure it in: Settings → Environments → PlayStore"
            exit 1
          fi

          echo "✅ All required secrets are present"

      - name: 🔑 Create keystore from base64
        run: |
          echo "Creating keystore file..."
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/zapar-release.keystore

          # Validate keystore size
          size=$(stat -c%s android/app/zapar-release.keystore)
          if [ "$size" -lt 100 ]; then
            echo "❌ ERROR: Keystore file is too small ($size bytes)"
            echo "The KEYSTORE_BASE64 secret may be corrupted"
            exit 1
          fi

          echo "✅ Keystore created: $size bytes"

      - name: 📝 Create key.properties
        run: |
          echo "Creating key.properties..."
          cat > android/key.properties << EOF
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=zapar-release.keystore
          EOF

          echo "✅ key.properties created"

      # =================================================================
      # FASE 2: SETUP Y CACHE
      # =================================================================

      # =================================================================
      # OPTIMIZACIÓN: Cache de pub dependencies ANTES de Flutter setup
      # =================================================================
      - name: Cache pub dependencies
        uses: actions/cache@v4
        id: pub-cache
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      # =================================================================
      # OPTIMIZACIÓN: Cache de Gradle dependencies
      # =================================================================
      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            android/.gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      # =================================================================
      # OPTIMIZACIÓN: Flutter setup con pub-cache-key
      # =================================================================
      - name: Setup Flutter
        id: flutter-setup
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true
          pub-cache-key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}

      - name: Verify environment
        run: |
          echo "=== Java version ==="
          java -version
          echo ""
          echo "=== Flutter environment ==="
          flutter doctor -v

      # =================================================================
      # FASE 3: BUILD
      # =================================================================

      # =================================================================
      # OPTIMIZACIÓN: Skip pub get si cache hit
      # =================================================================
      - name: Install dependencies
        if: steps.flutter-setup.outputs.PUB-CACHE-HIT != 'true'
        run: |
          echo "📦 Installing dependencies..."
          flutter pub get
          echo "✅ Dependencies installed"

      - name: Dependencies already cached
        if: steps.flutter-setup.outputs.PUB-CACHE-HIT == 'true'
        run: echo "✅ Using cached dependencies (pub-cache hit)"

      # =================================================================
      # OPTIMIZACIÓN: Cache de build_runner output
      # =================================================================
      - name: Cache build_runner output
        uses: actions/cache@v4
        with:
          path: |
            .dart_tool/build
            **/*.g.dart
          key: ${{ runner.os }}-build-runner-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-build-runner-

      - name: Run build_runner
        continue-on-error: true
        run: |
          if grep -q "build_runner:" pubspec.yaml; then
            echo "Running build_runner..."
            flutter pub run build_runner build --delete-conflicting-outputs || {
              echo "⚠️ build_runner failed but continuing (non-blocking)"
              exit 0
            }
          else
            echo "build_runner not found in pubspec.yaml, skipping"
          fi

      - name: Run tests (non-blocking)
        continue-on-error: true
        run: |
          echo "Running tests (non-blocking for hotfixes)..."
          flutter test --reporter expanded || echo "⚠️ Tests failed but continuing build"

      - name: Calculate version
        id: version
        run: |
          # Extract version from pubspec.yaml
          VERSION_NAME=$(grep "^version:" pubspec.yaml | cut -d' ' -f2 | cut -d'+' -f1)
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "📦 Version name: $VERSION_NAME"

          # Calculate version code
          VERSION_CODE=$((BASE_VERSION_CODE + GITHUB_RUN_NUMBER))
          echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "🔢 Version code: $VERSION_CODE"

      - name: Create local.properties with version
        run: |
          cat > android/local.properties << EOF
          sdk.dir=$ANDROID_SDK_ROOT
          flutter.versionCode=${{ steps.version.outputs.VERSION_CODE }}
          flutter.versionName=${{ steps.version.outputs.VERSION_NAME }}
          EOF

          echo "✅ local.properties created:"
          cat android/local.properties

      - name: Build release APKs (split per ABI)
        run: |
          echo "Building release APKs..."
          flutter build apk --release --split-per-abi \
            --build-name=${{ steps.version.outputs.VERSION_NAME }} \
            --build-number=${{ steps.version.outputs.VERSION_CODE }}

      - name: Build release AAB (Google Play)
        run: |
          echo "Building release AAB..."
          flutter build appbundle --release \
            --build-name=${{ steps.version.outputs.VERSION_NAME }} \
            --build-number=${{ steps.version.outputs.VERSION_CODE }}

      # =================================================================
      # FASE 4: VALIDACIÓN POST-BUILD
      # =================================================================

      - name: Validate APK outputs
        run: |
          echo "📦 Validating generated APKs..."
          ls -lh build/app/outputs/flutter-apk/

          # Check each expected APK
          for abi in armeabi-v7a arm64-v8a x86 x86_64; do
            apk_file="build/app/outputs/flutter-apk/app-${abi}-release.apk"
            if [ -f "$apk_file" ]; then
              size=$(stat -c%s "$apk_file")
              if [ "$size" -gt 1048576 ]; then
                echo "✅ $apk_file: $(numfmt --to=iec-i --suffix=B $size)"
              else
                echo "❌ $apk_file is too small ($size bytes)"
                exit 1
              fi
            else
              echo "❌ Missing: $apk_file"
              exit 1
            fi
          done

      - name: Validate AAB output
        run: |
          echo "📦 Validating AAB..."
          aab_file="build/app/outputs/bundle/release/app-release.aab"

          if [ -f "$aab_file" ]; then
            size=$(stat -c%s "$aab_file")
            if [ "$size" -gt 1048576 ]; then
              echo "✅ $aab_file: $(numfmt --to=iec-i --suffix=B $size)"
            else
              echo "❌ AAB is too small ($size bytes)"
              exit 1
            fi
          else
            echo "❌ Missing: $aab_file"
            exit 1
          fi

      - name: List all outputs
        run: |
          echo "=== All build outputs ==="
          find build/app/outputs -type f -name "*.apk" -o -name "*.aab" | while read file; do
            size=$(stat -c%s "$file")
            echo "$(numfmt --to=iec-i --suffix=B $size) - $file"
          done

      # =================================================================
      # FASE 5: ARTIFACTS
      # =================================================================

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: apks-${{ steps.version.outputs.VERSION_NAME }}
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 30
          if-no-files-found: error

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: aab-${{ steps.version.outputs.VERSION_NAME }}
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 30
          if-no-files-found: error

      # =================================================================
      # FASE 6: GITHUB RELEASE (solo para tags)
      # =================================================================

      - name: Prepare release assets
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          echo "Preparing release assets..."
          mkdir -p release-assets

          # Copy and rename APKs
          cp build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk \
             release-assets/zapar-app-${{ steps.version.outputs.VERSION_NAME }}-armeabi-v7a.apk

          cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk \
             release-assets/zapar-app-${{ steps.version.outputs.VERSION_NAME }}-arm64-v8a.apk

          cp build/app/outputs/flutter-apk/app-x86-release.apk \
             release-assets/zapar-app-${{ steps.version.outputs.VERSION_NAME }}-x86.apk

          cp build/app/outputs/flutter-apk/app-x86_64-release.apk \
             release-assets/zapar-app-${{ steps.version.outputs.VERSION_NAME }}-x86_64.apk

          # Copy AAB
          cp build/app/outputs/bundle/release/app-release.aab \
             release-assets/zapar-app-${{ steps.version.outputs.VERSION_NAME }}.aab

          echo "✅ Release assets prepared:"
          ls -lh release-assets/

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
          body: |
            ## 📦 Zapar App ${{ steps.version.outputs.VERSION_NAME }}

            ### Instalación

            Descarga el APK correspondiente a tu dispositivo:

            - **ARM 64-bit** (Recomendado para mayoría de dispositivos modernos):
              `zapar-app-${{ steps.version.outputs.VERSION_NAME }}-arm64-v8a.apk`

            - **ARM 32-bit** (Dispositivos antiguos):
              `zapar-app-${{ steps.version.outputs.VERSION_NAME }}-armeabi-v7a.apk`

            - **x86 64-bit** (Emuladores):
              `zapar-app-${{ steps.version.outputs.VERSION_NAME }}-x86_64.apk`

            - **x86 32-bit** (Emuladores antiguos):
              `zapar-app-${{ steps.version.outputs.VERSION_NAME }}-x86.apk`

            ### Google Play Store

            El archivo AAB está disponible para publicación en Google Play:
            `zapar-app-${{ steps.version.outputs.VERSION_NAME }}.aab`

            ### Instalación vía ADB

            ```bash
            adb install -r zapar-app-${{ steps.version.outputs.VERSION_NAME }}-arm64-v8a.apk
            ```

            ### Build Info

            - **Version Name:** ${{ steps.version.outputs.VERSION_NAME }}
            - **Version Code:** ${{ steps.version.outputs.VERSION_CODE }}
            - **Target SDK:** 35
            - **Compile SDK:** 36
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # =================================================================
      # FASE 7: DEPLOY A PLAY STORE (opcional)
      # =================================================================

      - name: Deploy to Google Play Store
        if: |
          (github.event.inputs.deploy_to_playstore == 'true' || startsWith(github.ref, 'refs/tags/v')) &&
          secrets.GOOGLE_PLAY_SERVICE_ACCOUNT != ''
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT }}
          packageName: phanan.koel.app
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          track: ${{ github.event.inputs.track || 'internal' }}
          status: completed
          inAppUpdatePriority: 3

      # =================================================================
      # FASE 8: BUILD SUMMARY
      # =================================================================

      - name: Build summary
        if: always()
        run: |
          echo "## 📊 Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ steps.version.outputs.VERSION_NAME }}" >> $GITHUB_STEP_SUMMARY
          echo "**Version Code:** ${{ steps.version.outputs.VERSION_CODE }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### APKs generados:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          for abi in armeabi-v7a arm64-v8a x86 x86_64; do
            apk_file="build/app/outputs/flutter-apk/app-${abi}-release.apk"
            if [ -f "$apk_file" ]; then
              size=$(stat -c%s "$apk_file")
              echo "- ✅ \`$abi\`: $(numfmt --to=iec-i --suffix=B $size)" >> $GITHUB_STEP_SUMMARY
            else
              echo "- ❌ \`$abi\`: Missing" >> $GITHUB_STEP_SUMMARY
            fi
          done

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### AAB:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          aab_file="build/app/outputs/bundle/release/app-release.aab"
          if [ -f "$aab_file" ]; then
            size=$(stat -c%s "$aab_file")
            echo "- ✅ Google Play Bundle: $(numfmt --to=iec-i --suffix=B $size)" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ❌ Google Play Bundle: Missing" >> $GITHUB_STEP_SUMMARY
          fi

  build-ios:
    name: Build iOS
    runs-on: macos-latest
    timeout-minutes: 60
    if: github.event.inputs.build_ios == 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build iOS (no-codesign)
        run: |
          echo "⚠️ iOS build requires Apple Developer account and code signing"
          echo "Building without code signing for validation only..."
          flutter build ios --release --no-codesign

      - name: iOS build placeholder
        run: |
          echo "## 📱 iOS Build" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "⚠️ iOS builds require:" >> $GITHUB_STEP_SUMMARY
          echo "- Apple Developer account (\$99/año)" >> $GITHUB_STEP_SUMMARY
          echo "- Code signing certificate" >> $GITHUB_STEP_SUMMARY
          echo "- Provisioning profile" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Para producción, configurar Fastlane y secrets de iOS." >> $GITHUB_STEP_SUMMARY

name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build_release:
    runs-on: ubuntu-latest
    environment: PlayStore
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup signing
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/upload-keystore.jks
          cat > android/key.properties << EOF
          storeFile=upload-keystore.jks
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          EOF

      - name: Compute Flutter version metadata
        id: versioning
        run: |
          VERSION_LINE="$(python3 - <<'PY'
          from pathlib import Path

          for line in Path('pubspec.yaml').read_text().splitlines():
              if line.startswith('version:'):
                  print(line.split(':', 1)[1].strip())
                  break
          else:
              raise SystemExit('Unable to locate version in pubspec.yaml')
          PY
          )"

          VERSION_NAME="${VERSION_LINE%%+*}"
          IFS='.' read -r MAJOR MINOR PATCH <<EOF
          $VERSION_NAME
          EOF

          if (( 10#$MAJOR > 9 || 10#$MINOR > 99 || 10#$PATCH > 99 )); then
            echo "Version segments must stay within 0-9 / 0-99 / 0-99: $VERSION_NAME" >&2
            exit 1
          fi

          if (( 10#$GITHUB_RUN_NUMBER > 9999 )); then
            echo "GITHUB_RUN_NUMBER exceeds reserved 4-digit build space: $GITHUB_RUN_NUMBER" >&2
            exit 1
          fi

          SEMANTIC_CODE=$((10#$MAJOR * 100000000 + 10#$MINOR * 1000000 + 10#$PATCH * 10000))
          BUILD_SEQUENCE=$((10#$GITHUB_RUN_NUMBER))

          VERSION_CODE=$((SEMANTIC_CODE + BUILD_SEQUENCE))

          echo "version_name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "version_code=$VERSION_CODE" >> "$GITHUB_OUTPUT"

      - name: Build AppBundle
        run: >
          flutter build appbundle --release
          --build-name="${{ steps.versioning.outputs.version_name }}"
          --build-number="${{ steps.versioning.outputs.version_code }}"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          files: build/app/outputs/bundle/release/app-release.aab

      - name: Persist release tag
        run: echo "${{ github.ref_name }}" > release-tag.txt

      - name: Upload release metadata
        uses: actions/upload-artifact@v4
        with:
          name: release-metadata
          path: release-tag.txt

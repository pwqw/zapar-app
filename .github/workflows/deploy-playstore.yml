name: Deploy to Play Store

on:
  workflow_call:
    inputs:
      tag:
        description: Release tag (e.g. v35)
        required: true
        type: string
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to deploy (for example v2.2.5)
        required: true
        type: string

permissions:
  contents: read

jobs:
  resolve_release_tag:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.release_tag.outputs.value }}
    steps:
      - name: Resolve release tag
        id: release_tag
        run: |
          TAG='${{ inputs.tag }}'
          if [ -z "$TAG" ]; then
            TAG='${{ github.event.inputs.tag }}'
          fi

          case "$TAG" in
            v*)
              echo "value=$TAG" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Invalid release tag: $TAG" >&2
              exit 1
              ;;
          esac

  deploy_playstore:
    needs: resolve_release_tag
    runs-on: ubuntu-latest
    environment: PlayStore
    concurrency:
      group: playstore-${{ needs.resolve_release_tag.outputs.tag }}
      cancel-in-progress: false
    steps:
      - name: Download release bundle
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download "${{ needs.resolve_release_tag.outputs.tag }}" \
            --pattern 'app-release.aab' \
            --dir release-assets

      - name: Upload to Play Store (beta)
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT }}
          packageName: ${{ secrets.PACKAGE_NAME }}
          releaseFiles: release-assets/app-release.aab
          track: beta
          status: completed

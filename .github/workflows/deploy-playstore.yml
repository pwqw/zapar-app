name: Deploy to Play Store

on:
  workflow_run:
    workflows:
      - Build & Release
    types:
      - completed
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to deploy (for example v2.2.5)
        required: true
        type: string

permissions:
  actions: read
  contents: read

jobs:
  resolve_release_tag:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.release_tag.outputs.value }}
    steps:
      - name: Resolve release tag
        id: release_tag
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
          WORKFLOW_RUN_ID: ${{ github.event.workflow_run.id }}
        run: |
          RELEASE_TAG=''

          if [ -n "$INPUT_TAG" ]; then
            RELEASE_TAG="$INPUT_TAG"
          fi

          if [ -z "$RELEASE_TAG" ] && [ -n "$WORKFLOW_RUN_ID" ]; then
            if gh run download "$WORKFLOW_RUN_ID" \
              --name release-metadata \
              --dir release-metadata; then
              if [ -f release-metadata/release-tag.txt ]; then
                RELEASE_TAG="$(tr -d '\n' < release-metadata/release-tag.txt)"
              fi
            fi
          fi

          if [ -z "$RELEASE_TAG" ]; then
            echo "Unable to determine release tag." >&2
            exit 1
          fi

          case "$RELEASE_TAG" in
            v*)
              echo "value=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Invalid release tag: $RELEASE_TAG" >&2
              exit 1
              ;;
          esac

  deploy_playstore:
    needs: resolve_release_tag
    runs-on: ubuntu-latest
    environment: PlayStore
    concurrency:
      group: playstore-${{ needs.resolve_release_tag.outputs.tag }}
      cancel-in-progress: false
    steps:
      - name: Download release bundle
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download "${{ needs.resolve_release_tag.outputs.tag }}" \
            --pattern 'app-release.aab' \
            --dir release-assets

      - name: Upload to Play Store (beta)
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT }}
          packageName: ${{ secrets.PACKAGE_NAME }}
          releaseFiles: release-assets/app-release.aab
          track: beta
          status: completed

name: Pull Request Validation

on:
  pull_request:
    branches:
      - master
      - main
      - develop

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  analyze-and-test:
    name: Analyze & Test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true

      - name: Validate pubspec.yaml
        run: flutter pub get --dry-run

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Install dependencies
        run: flutter pub get

      - name: Run build_runner
        run: |
          if grep -q "build_runner:" pubspec.yaml; then
            echo "Running build_runner..."
            flutter pub run build_runner build --delete-conflicting-outputs
          else
            echo "build_runner not found in pubspec.yaml, skipping"
          fi

      - name: Verify Flutter environment
        run: flutter doctor -v

      - name: Run Flutter analyze
        run: flutter analyze --no-fatal-infos

      - name: Check Dart formatting
        run: dart format --set-exit-if-changed .

      - name: Run tests with coverage
        run: flutter test --coverage --reporter expanded

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/lcov.info
          flags: unittests
          name: codecov-zapar-app
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  build-android-debug:
    name: Build Android Debug APKs
    runs-on: ubuntu-latest
    needs: analyze-and-test
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            android/.gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Install dependencies
        run: flutter pub get

      - name: Run build_runner
        run: |
          if grep -q "build_runner:" pubspec.yaml; then
            echo "Running build_runner..."
            flutter pub run build_runner build --delete-conflicting-outputs
          else
            echo "build_runner not found in pubspec.yaml, skipping"
          fi

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties
          cat android/local.properties

      - name: Build debug APKs (split per ABI)
        run: flutter build apk --debug --split-per-abi

      - name: Validate APK outputs
        run: |
          echo "📦 Checking generated APKs..."
          ls -lh build/app/outputs/flutter-apk/

          # Check each expected APK
          for abi in armeabi-v7a arm64-v8a x86 x86_64; do
            apk_file="build/app/outputs/flutter-apk/app-${abi}-debug.apk"
            if [ -f "$apk_file" ]; then
              size=$(stat -f%z "$apk_file" 2>/dev/null || stat -c%s "$apk_file")
              if [ "$size" -gt 1048576 ]; then
                echo "✅ $apk_file: $(numfmt --to=iec-i --suffix=B $size 2>/dev/null || echo "${size} bytes")"
              else
                echo "❌ $apk_file is too small ($size bytes)"
                exit 1
              fi
            else
              echo "❌ Missing: $apk_file"
              exit 1
            fi
          done

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: debug-apks-pr-${{ github.event.pull_request.number }}
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 2
          if-no-files-found: error

      - name: Comment PR with download links
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const runId = context.runId;
            const repo = context.repo;

            const comment = `## 📦 Debug APKs generados

            Los APKs de debug están listos para descargar:

            🔗 [Descargar artifacts](https://github.com/${repo.owner}/${repo.repo}/actions/runs/${runId})

            **Archivos disponibles:**
            - \`app-armeabi-v7a-debug.apk\` (ARM 32-bit)
            - \`app-arm64-v8a-debug.apk\` (ARM 64-bit) ⭐ Recomendado
            - \`app-x86-debug.apk\` (x86 32-bit, emuladores)
            - \`app-x86_64-debug.apk\` (x86 64-bit, emuladores)

            **Instalación:**
            \`\`\`bash
            adb install -r app-arm64-v8a-debug.apk
            \`\`\`

            ⏱️ Los artifacts estarán disponibles por 2 días.
            `;

            github.rest.issues.createComment({
              owner: repo.owner,
              repo: repo.repo,
              issue_number: prNumber,
              body: comment
            });

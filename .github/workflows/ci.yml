name: Continuous Integration

on:
  push:
    branches:
      - master
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze-and-test:
    name: Analyze & Test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # =================================================================
      # OPTIMIZACIÓN 1: Cache de pub dependencies ANTES de Flutter setup
      # Según: https://www.revelo.com/blog/how-we-reduced-our-flutter-ci-execution-time-by-around-20
      # =================================================================
      - name: Cache pub dependencies
        uses: actions/cache@v4
        id: pub-cache
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      # =================================================================
      # OPTIMIZACIÓN 2: Java setup con cache de Gradle
      # =================================================================
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      # =================================================================
      # OPTIMIZACIÓN 3: Flutter setup con cache habilitado + pub-cache-key
      # Según: https://github.com/subosito/flutter-action
      # =================================================================
      - name: Setup Flutter
        id: flutter-setup
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true
          pub-cache-key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}

      # =================================================================
      # OPTIMIZACIÓN 4: Skip pub get si cache hit
      # Según: https://github.com/subosito/flutter-action/issues/16
      # =================================================================
      - name: Install dependencies
        if: steps.flutter-setup.outputs.PUB-CACHE-HIT != 'true'
        run: |
          echo "📦 Installing dependencies..."
          flutter pub get
          echo "✅ Dependencies installed"

      - name: Dependencies already cached
        if: steps.flutter-setup.outputs.PUB-CACHE-HIT == 'true'
        run: echo "✅ Using cached dependencies (pub-cache hit)"

      # =================================================================
      # OPTIMIZACIÓN 5: Cache de build_runner output
      # Según: https://dikman.medium.com/optimising-flutter-ci-by-caching-packages-8a1d537e0b23
      # =================================================================
      - name: Cache build_runner output
        uses: actions/cache@v4
        with:
          path: |
            .dart_tool/build
            **/*.g.dart
          key: ${{ runner.os }}-build-runner-${{ hashFiles('**/pubspec.lock', '**/.dart_tool/build/entrypoint/build.dart.snapshot') }}
          restore-keys: |
            ${{ runner.os }}-build-runner-

      - name: Run build_runner
        continue-on-error: true
        run: |
          if grep -q "build_runner:" pubspec.yaml; then
            echo "Running build_runner..."
            flutter pub run build_runner build --delete-conflicting-outputs || {
              echo "⚠️ build_runner failed but continuing (non-blocking)"
              exit 0
            }
          else
            echo "build_runner not found in pubspec.yaml, skipping"
          fi

      # =================================================================
      # Análisis y Tests (sin cambios)
      # =================================================================
      - name: Run Flutter analyze
        run: flutter analyze --no-fatal-infos

      - name: Check Dart formatting
        run: dart format --set-exit-if-changed .

      - name: Run tests with coverage
        run: flutter test --coverage --reporter expanded

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/lcov.info
          flags: unittests
          name: codecov-zapar-app
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
